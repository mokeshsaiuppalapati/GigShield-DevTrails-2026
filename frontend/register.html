<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<style>
body { font-family: Arial; background:#f0f8ff; }
input, button { margin:5px; padding:8px; }
button { background:#2ecc71; color:white; border:none; }
</style>

</head>

<body>

<h2>Register Worker</h2>

<a href="index.html">Home</a> |
<a href="policy.html">Policy</a> |
<a href="dashboard.html">Dashboard</a>
<hr>

<input id="name" placeholder="Name"><br>
<input id="phone" placeholder="Phone"><br>
<input id="zone" placeholder="Zone"><br>
<input id="income" placeholder="Income"><br>

<button type="button" onclick="register()">Register</button>

<pre id="output"></pre>

<script>
const base = "http://localhost:3000";

function register() {
    fetch(base + "/register", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            name: document.getElementById("name").value,
            phone: document.getElementById("phone").value,
            zone: document.getElementById("zone").value,
            upi: "test@upi",
            income: Number(document.getElementById("income").value)
        })
    })
    .then(res => res.json())
    .then(data => {
        localStorage.setItem("worker_id", data.id);
        show(data);
    });
}

function show(data) {
    document.getElementById("output").innerText =
        "✅ Registered! Worker ID: " + data.id;
}
</script>

</body>
</html>
