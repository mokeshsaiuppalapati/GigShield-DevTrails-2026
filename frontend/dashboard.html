<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body { font-family: Arial; background:#eef; }
button { background:#e74c3c; color:white; padding:8px; border:none; }
</style>

</head>

<body>

<h2>Trigger Event</h2>

<a href="index.html">Home</a> |
<a href="register.html">Register</a> |
<a href="policy.html">Policy</a>
<hr>

<input id="zone" placeholder="Zone"><br>

<select id="type">
<option value="rain">Rain</option>
<option value="heat">Heat</option>
<option value="aqi">AQI</option>
</select>

<input id="hours" placeholder="Hours"><br>

<button type="button" onclick="trigger()">Trigger</button>

<pre id="output"></pre>

<script>
const base = "http://localhost:3000";

function trigger() {
    fetch(base + "/trigger", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            type: document.getElementById("type").value,
            zone: document.getElementById("zone").value,
            hours: Number(document.getElementById("hours").value)
        })
    })
    .then(res => res.json())
    .then(data => {
        let text = data.message + "\n";

        if (data.claims.length > 0) {
            data.claims.forEach(c => {
                text += "Worker " + c.worker_id +
                        " → ₹" + c.payout + "\n";
            });
        } else {
            text += "No claims generated";
        }

        document.getElementById("output").innerText = text;
    });
}
</script>

</body>
</html>
